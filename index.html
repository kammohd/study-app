let state = {}, queue = {}, tab = "today";
let liveQuote = "", quoteBusy = false;
let curQ = null, qBusy = false, qErr = false, answered = false, qScore = 0;
try { state = JSON.parse(localStorage.getItem("prog")) || {}; } catch(e) {}
try { queue = JSON.parse(localStorage.getItem("queue")) || {}; } catch(e) {}
const cfg = () => localStorage.getItem("sheetUrl") || "";

function save() { localStorage.setItem("prog", JSON.stringify(state)); localStorage.setItem("queue", JSON.stringify(queue)); }
function curWeek() { const d = Math.floor((Date.now() - START) / 864e5); return Math.min(16, Math.max(1, Math.floor(d / 7) + 1)); }

function todayInfo() {
  const now = new Date();
  const d = Math.floor((now - START) / 864e5);
  if (d < 0) return { pre: true };
  const week = Math.floor(d / 7) + 1;
  const dow = (now.getDay() === 0) ? 7 : now.getDay();
  if (week > 16) return { done: true };
  if (dow === 7) return { rest: true, week };
  return { week, dow, task: W[week-1].ts[dow-1], phone: W[week-1].ph[dow-1] === "p", id: "w" + week + "t" + (dow-1) };
}

function setDot(cls, lbl) { const d = document.getElementById("syncDot"); d.className = "dot " + cls; document.getElementById("syncLbl").textContent = lbl; }

async function pull() {
  if (!cfg()) { setDot("", "local only"); return; }
  try {
    const r = await fetch(cfg() + "?t=" + Date.now());
    const remote = await r.json();
    Object.entries(remote).forEach(([k, v]) => { if (v && !(k in queue)) state[k] = v; });
    Object.keys(state).forEach(k => { if (!(k in remote) && !(k in queue)) delete state[k]; });
    save(); setDot("ok", "synced"); flushQueue();
  } catch(e) { setDot("err", "sync failed"); }
}
async function push(id, val) {
  queue[id] = val; save();
  if (!cfg()) { setDot("off", "not connected"); return; }
  flushQueue();
}
async function flushQueue() {
  if (!cfg() || !Object.keys(queue).length) return;
  const batch = { ...queue };
  try {
    await fetch(cfg(), { method: "POST", body: JSON.stringify({ ticks: batch }) });
    Object.keys(batch).forEach(k => delete queue[k]);
    save(); setDot("ok", "synced");
  } catch(e) { setDot("off", "will retry"); }
}

async function loadQuote() {
  if (!cfg() || quoteBusy) return;
  quoteBusy = true;
  try {
    const r = await fetch(cfg() + "?action=quote&t=" + Date.now());
    const d = await r.json();
    if (d.quote) {
      liveQuote = d.quote;
      const el = document.getElementById("quoteTxt");
      if (el) el.textContent = "“" + liveQuote + "”";
    }
  } catch(e) {}
  quoteBusy = false;
}

let preQ = null;
async function fetchQ() {
  const r = await fetch(cfg(), { method: "POST", body: JSON.stringify({ quiz: "next", week: curWeek() }) });
  const d = await r.json();
  if (!d.question || !d.options) throw new Error("bad");
  return d;
}
async function prefetchQ() {
  if (preQ || !cfg()) return;
  try { preQ = await fetchQ(); } catch(e) {}
}
async function nextQ() {
  if (!cfg()) { curQ = null; render(); return; }
  answered = false;
  if (preQ) { curQ = preQ; preQ = null; render(); prefetchQ(); return; }
  qBusy = true; qErr = false; curQ = null; render();
  try { curQ = await fetchQ(); } catch(e) { qErr = true; }
  qBusy = false; render();
  prefetchQ();
}

function answerQ(btn, i) {
  if (answered || !curQ) return;
  answered = true;
  const right = Number(curQ.correct);
  document.querySelectorAll(".quizopt").forEach((b, j) => { if (j === right) b.classList.add("right"); });
  if (i !== right) { btn.classList.add("wrong"); }
  else {
    qScore++;
    fetch(cfg(), { method: "POST", body: JSON.stringify({ quiz: "mastered", question: curQ.question }) }).catch(() => {});
  }
  const s = document.getElementById("qScore");
  if (s) s.textContent = "score " + qScore;
}

function toggle(id) {
  if (state[id]) { delete state[id]; push(id, null); }
  else { const d = new Date().toISOString().slice(0,10); state[id] = d; push(id, d); }
  save(); render();
}

function stats() {
  const total = 96, done = Object.keys(state).filter(k => /^w\d+t\d+$/.test(k)).length;
  const dates = new Set(Object.values(state)); let streak = 0; const d = new Date();
  if (!dates.has(d.toISOString().slice(0,10))) d.setDate(d.getDate()-1);
  while (dates.has(d.toISOString().slice(0,10))) { streak++; d.setDate(d.getDate()-1); }
  return { done, total, pct: Math.round(done/total*100), streak };
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

// ---- Videos ----
function vidWatched(wk, d) { return !!state["w" + wk + "v" + d]; }

function toggleV(wk, d, btn) {
  const id = "w" + wk + "v" + d;
  if (state[id]) { delete state[id]; push(id, null); }
  else { const dt = new Date().toISOString().slice(0,10); state[id] = dt; push(id, dt); }
  save();
  if (document.querySelector(".vframe") || document.querySelector(".pybox")) {
    // media/editor open — update in place instead of re-rendering (which would kill it)
    if (btn) { btn.classList.toggle("on", !!state[id]); btn.textContent = state[id] ? "✓ Watched" : "Mark watched"; }
  } else { render(); }
}

function pickVid(wk, prefDay) {
  const list = YT[wk] || [];
  if (!list.length) return 0;
  const order = [];
  if (prefDay >= 1 && prefDay <= list.length) order.push(prefDay);
  for (let d = 1; d <= list.length; d++) if (d !== prefDay) order.push(d);
  for (const d of order) if (list[d-1] && !vidWatched(wk, d)) return d;
  return -1; // all watched
}

function vidCard(wk, d) {
  const v = (YT[wk] || [])[d-1]; if (!v) return "";
  const seen = vidWatched(wk, d);
  return `<div class="vidbox" id="vb_${wk}_${d}">
    <div class="vfacade" onclick="playVid(${wk},${d},'${v[1]}')">
      <img src="https://i.ytimg.com/vi/${v[1]}/hqdefault.jpg" alt="" loading="lazy">
      <div class="vplay">▶</div><span class="vdur">${v[2]}</span>
    </div>
    <div class="vmeta"><span class="vtitle">${esc(v[0])}</span>
      <button class="vtick ${seen?'on':''}" onclick="toggleV(${wk},${d},this)">${seen?'✓ Watched':'Mark watched'}</button>
    </div></div>`;
}

function playVid(wk, d, id) {
  const f = document.querySelector(`#vb_${wk}_${d} .vfacade`);
  if (f) f.outerHTML = `<div class="vframe"><iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&playsinline=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>`;
}

function vidRow(wk, d) {
  const v = (YT[wk] || [])[d-1]; if (!v) return "";
  const seen = vidWatched(wk, d);
  return `<div class="vrow ${seen?'seen':''}" id="vr_${wk}_${d}">
    <img class="vthumb" src="https://i.ytimg.com/vi/${v[1]}/mqdefault.jpg" alt="" loading="lazy" onclick="expandVid(${wk},${d})">
    <div class="vinfo" onclick="expandVid(${wk},${d})"><b>D${d}</b> · ${esc(v[0])}<small>${v[2]}${seen?' · watched ✓':''}</small></div>
    <button class="vtick ${seen?'on':''}" onclick="toggleV(${wk},${d},this)">${seen?'✓':'○'}</button></div>`;
}

function expandVid(wk, d) {
  const v = (YT[wk] || [])[d-1]; if (!v) return;
  const seen = vidWatched(wk, d);
  const row = document.getElementById(`vr_${wk}_${d}`);
  if (row) row.outerHTML = `<div class="vidbox">
    <div class="vframe"><iframe src="https://www.youtube-nocookie.com/embed/${v[1]}?autoplay=1&playsinline=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>
    <div class="vmeta"><span class="vtitle">${esc(v[0])}</span>
      <button class="vtick ${seen?'on':''}" onclick="toggleV(${wk},${d},this)">${seen?'✓ Watched':'Mark watched'}</button>
    </div></div>`;
}

// ---- Practice (in-app Python via Pyodide) ----
let pyodide = null, pyLoading = null, exBusy = false;

function ensurePy() {
  if (pyodide) return Promise.resolve(pyodide);
  if (!pyLoading) {
    pyLoading = new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js";
      s.onload = res;
      s.onerror = () => rej(new Error("couldn't download Python — check your connection"));
      document.head.appendChild(s);
    }).then(() => loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.4/full/" }))
      .then(p => { pyodide = p; return p; })
      .catch(e => { pyLoading = null; throw e; });
  }
  return pyLoading;
}

const RUN_PY = `
import sys, io, traceback
_buf = io.StringIO()
_old = sys.stdout
sys.stdout = _buf
try:
    exec(_user_code, {})
except Exception:
    traceback.print_exc(file=_buf)
sys.stdout = _old
_buf.getvalue()
`;

const CHECK_PY = `
import sys, io, traceback, json as _json
_buf = io.StringIO()
_old = sys.stdout
sys.stdout = _buf
_ns = {}
_ok = False
_msg = ""
try:
    exec(_user_code, _ns)
    exec(_test_code, _ns)
    _ok = True
except AssertionError as _e:
    _msg = str(_e) or "one of the checks failed"
except Exception:
    _msg = traceback.format_exc().strip().split(chr(10))[-1]
sys.stdout = _old
_json.dumps({"ok": _ok, "msg": _msg, "out": _buf.getvalue()})
`;

function exSolved(wk, i) { return !!state["w" + wk + "e" + i]; }

async function runEx(wk, i, mode) {
  if (exBusy) return;
  const ta = document.getElementById("pyed_" + wk + "_" + i);
  const out = document.getElementById("pyout_" + wk + "_" + i);
  if (!ta || !out) return;
  exBusy = true;
  out.style.display = "block";
  try {
    if (!pyodide) out.textContent = "⏳ Loading Python (~10 MB the first time, instant after)…";
    const py = await ensurePy();
    py.globals.set("_user_code", ta.value);
    if (mode === "run") {
      out.textContent = "▶ running…";
      const res = await py.runPythonAsync(RUN_PY);
      out.textContent = (res && res.trim()) ? res.slice(0, 2000) : "(no output — add a print())";
    } else {
      py.globals.set("_test_code", EX[wk][i].test);
      out.textContent = "🧪 checking…";
      const res = JSON.parse(await py.runPythonAsync(CHECK_PY));
      if (res.ok) {
        out.textContent = (res.out ? res.out.slice(0, 800) + "\n" : "") + "✅ All checks passed!";
        const id = "w" + wk + "e" + i;
        if (!state[id]) { const dt = new Date().toISOString().slice(0, 10); state[id] = dt; push(id, dt); save(); }
        const st = document.getElementById("pyst_" + wk + "_" + i);
        if (st) { st.textContent = "✓ solved"; st.className = "expass"; }
      } else {
        out.textContent = ((res.out ? res.out.slice(0, 800) + "\n" : "") + "❌ " + res.msg).slice(0, 2000);
      }
    }
  } catch (e) { out.textContent = "⚠️ " + e.message; }
  exBusy = false;
}

function pyTab(e) {
  if (e.key === "Tab") {
    e.preventDefault();
    const t = e.target, s = t.selectionStart;
    t.value = t.value.slice(0, s) + "    " + t.value.slice(t.selectionEnd);
    t.selectionStart = t.selectionEnd = s + 4;
  }
}

function exRow(wk, i) {
  const ex = (EX[wk] || [])[i]; if (!ex) return "";
  const done = exSolved(wk, i);
  return `<div class="vrow ${done?'seen':''}" onclick="openEx(${wk},${i})" id="exr_${wk}_${i}">
    <div class="exbadge ${done?'on':''}">${done?'✓':'⌨️'}</div>
    <div class="vinfo">${esc(ex.t)}<small>${done?'solved ✓ · tap to redo':'tap to solve — right here'}</small></div></div>`;
}

function exBox(wk, i) {
  const ex = EX[wk][i];
  const done = exSolved(wk, i);
  return `<div class="pybox" id="exb_${wk}_${i}">
    <div class="vmeta" style="padding:0 0 6px"><span class="vtitle">⌨️ ${esc(ex.t)} <span id="pyst_${wk}_${i}" class="expass">${done?'✓ solved':''}</span></span>
      <button class="vtick" onclick="closeEx()">✕ close</button></div>
    <p class="muted">${esc(ex.q)}</p>
    <textarea class="pyed" id="pyed_${wk}_${i}" spellcheck="false" autocapitalize="off" autocorrect="off" onkeydown="pyTab(event)">${esc(ex.c)}</textarea>
    <div class="btnrow">
      <button class="btn ghost" onclick="runEx(${wk},${i},'run')">▶ Run</button>

    </div>
    <pre class="pyout" id="pyout_${wk}_${i}" style="display:none"></pre>
  </div>`;
}

function openEx(wk, i) {
  const row = document.getElementById("exr_" + wk + "_" + i);
  if (row) row.outerHTML = exBox(wk, i);
}
function closeEx() { render(); }

function render() {
  const v = document.getElementById("view");
  ["today","plan","learn","set"].forEach(t => document.getElementById("nav-"+t).className = t===tab ? "act" : "");
  document.getElementById("topTitle").textContent = {today:"Today", plan:"16-week plan", learn:"Learn", set:"Sync & settings"}[tab];
  if (tab === "today") { v.innerHTML = rToday(); loadQuote(); }
  if (tab === "plan") v.innerHTML = rPlan();
  if (tab === "learn") v.innerHTML = rLearn();
  if (tab === "set") v.innerHTML = rSet();
}

function rToday() {
  const t = todayInfo(), s = stats();
  const q = liveQuote || QUOTES[Math.floor(Date.now()/864e5) % QUOTES.length];
  let card;
  if (t.pre) card = `<div class="card"><h2>Starts Monday, 6 July</h2><p class="muted">Week 1, day 1: install Python — or just open Colab and skip the install entirely.</p></div>`;

  else {
    const wk = W[t.week-1];
    const done = !!state[t.id];
    card = `<div class="card">
      <div class="muted">Week ${t.week} of 16 · ${esc(wk.th)} · Day ${t.dow}</div>
      <h2 style="margin:8px 0 6px">${esc(t.task)}</h2>
      <span class="chip ${t.phone?'':'pc'}">${t.phone ? "📱 phone-friendly" : "💻 best on PC"}</span>
      ${wk.code ? `<a class="btn colab" href="${COLAB}" target="_blank">▶ Open Google Colab</a>
      <button class="btn ghost" onclick="copyCode(${t.week-1}, this)">📋 Copy this week's starter code</button>
      <pre class="code">${esc(wk.code)}</pre>` : ""}
      ${!t.phone ? `<p class="muted" style="margin-top:10px">Phone-only tonight? Run the starter code in Colab, or take a quiz in Learn — the PC part can wait for the weekend.</p>` : ""}
      <button class="btn primary ${done?'':'undone'}" onclick="toggle('${t.id}')">${done ? "✓ Done — tap to undo" : "Mark today done"}</button>
    </div>`;
  }
  let vidSec = "";
  if (!t.done) {
    const vw = t.pre ? 1 : (t.week || curWeek());
    const pd = t.dow || 0;
    const pick = pickVid(vw, pd);
    if (pick > 0) {
      const label = t.pre ? "🎬 Get a head start" : (t.rest ? "🎬 Optional Sunday watch" : (pick === pd ? "🎬 Today's watch" : "🎬 Catch-up watch"));
      vidSec = `<div class="card"><div class="muted" style="margin-bottom:4px">${label} · ${(YT[vw][pick-1]||[])[2] || ""}</div>${vidCard(vw, pick)}</div>`;
    } else if (pick === -1) {
      vidSec = `<div class="card"><div class="muted">🎬 All of week ${vw}'s videos watched 🔥 Rewatch any in Learn, or grab a quiz.</div></div>`;
    }
  }
  let exSec = "";
  if (!t.done) {
    const ew = t.pre ? 1 : (t.week || curWeek());
    const list = EX[ew] || [];
    if (list.length) {
      const solvedN = list.filter((_, i) => exSolved(ew, i)).length;
      const next = list.findIndex((_, i) => !exSolved(ew, i));
      exSec = `<div class="card"><div class="muted" style="margin-bottom:4px">⌨️ Hands-on · ${solvedN}/${list.length} solved this week · runs on your phone</div>
      ${next >= 0 ? exRow(ew, next) : `<p class="muted">All solved this week 💪 Redo any from the Learn tab.</p>`}</div>`;
    }
  }
  return `<div class="statrow">
    <div class="stat"><b>${s.streak}</b><span>streak</span></div>
    <div class="stat"><b>${s.done}/${s.total}</b><span>sessions</span></div>
    <div class="stat"><b>${s.pct}%</b><span>complete</span></div>
  </div>
  <div class="banner" id="quoteBanner">“<span id="quoteTxt">${esc(q)}</span>”</div>${card}${vidSec}${exSec}`;
}

function rPlan() {
  const cw = curWeek();
  let h = "";
  PHASES.forEach(([name, a, b]) => {
    h += `<div class="phasehd">${name}</div>`;
    for (let w = a; w < b; w++) {
      const dcount = W[w].ts.filter((_, i) => state["w"+(w+1)+"t"+i]).length;
      const open = (w+1) === cw ? "open" : "";
      h += `<div class="weekhd ${open} ${(w+1)===cw?'cur':''}" onclick="this.classList.toggle('open')">
        <span>W${w+1} · ${esc(W[w].th)}</span><span class="muted">${(w+1)===cw?'now · ':''}${dcount}/6</span></div>
      <div class="weekbody">${W[w].ts.map((t, i) => {
        const id = "w"+(w+1)+"t"+i, on = !!state[id];
        return `<div class="taskline ${on?'done':''}">
          <div class="tick ${on?'on':''}" onclick="toggle('${id}')">${on?'✓':''}</div>
          <div class="txt">D${i+1}: ${esc(t)} <span class="muted">${W[w].ph[i]==='p'?'📱':'💻'}</span></div></div>`;
      }).join("")}
      ${W[w].code ? `<a class="btn colab" href="${COLAB}" target="_blank">▶ Colab</a><button class="btn ghost" onclick="copyCode(${w}, this)">📋 Starter code</button>` : ""}</div>`;
    }
  });
  return h;
}

function rLearn() {
  const w = curWeek();
  const wk = W[w-1];
  let quizCard;
  if (!cfg()) {
    const q = wk.quiz[0];
    quizCard = `<div class="card">
      <div class="muted" style="margin-bottom:8px">Quiz (offline set — connect sync for AI questions)</div>
      <div class="quizq">${esc(q[0])}</div>
      ${q[1].map((o, i) => `<button class="quizopt" onclick="answerStatic(this, ${i}, ${q[2]})">${esc(o)}</button>`).join("")}
    </div>`;
  } else if (qBusy) {
    quizCard = `<div class="card"><div class="spin">🧠 Writing you a fresh question…</div></div>`;
  } else if (qErr) {
    quizCard = `<div class="card"><div class="muted">Couldn't generate a question — connection issue or quota. </div><button class="btn ghost" onclick="nextQ()">Try again</button></div>`;
  } else if (curQ) {
    quizCard = `<div class="card">
      <div class="muted" style="margin-bottom:8px">AI quiz · adapts to your progress · <span id="qScore">score ${qScore}</span></div>
      <div class="quizq">${esc(curQ.question)}</div>
      ${curQ.options.map((o, i) => `<button class="quizopt" onclick="answerQ(this, ${i})">${esc(o)}</button>`).join("")}
      <button class="btn ghost" onclick="nextQ()">Next question →</button>
    </div>`;
  } else {
    quizCard = `<div class="card"><h2>AI quiz</h2><p class="muted">Fresh questions written for exactly what you've studied. Answer one correctly and it never comes back.</p><button class="btn primary undone" onclick="nextQ()">Get a question</button></div>`;
  }
  const wl = YT[w] || [];
  const seenCount = wl.filter((_, i) => vidWatched(w, i+1)).length;
  const vidsCard = wl.length ? `<div class="card"><h2>This week's videos</h2>
    <p class="muted" style="margin-bottom:6px">${seenCount}/${wl.length} watched · each one matches a day's task</p>
    ${wl.map((_, i) => vidRow(w, i+1)).join("")}
  </div>` : "";
  const exl = EX[w] || [];
  const exCard = exl.length ? `<div class="card"><h2>Hands-on practice</h2>
    <p class="muted" style="margin-bottom:6px">${exl.filter((_, i) => exSolved(w, i)).length}/${exl.length} solved · real Python, right in the app</p>
    ${exl.map((_, i) => exRow(w, i)).join("")}
  </div>` : "";
  return quizCard + exCard + vidsCard + `<div class="card"><h2>This week's resources</h2>
    ${wk.rs.map(r => `<a class="rsrc" href="${r[2]}" target="_blank"><span>🔗</span><span>${esc(r[0])}<small>${esc(r[1])}</small></span></a>`).join("")}
  </div>
  <div class="card"><h2>On-the-go drills</h2>
    <a class="rsrc" href="https://colab.new" target="_blank"><span>▶</span><span>Colab — blank notebook<small>hands-on anywhere</small></span></a>
    <a class="rsrc" href="https://getmimo.com" target="_blank"><span>📲</span><span>Mimo — 5-min Python drills<small>iOS & Android</small></span></a>
  </div>`;
}

function answerStatic(btn, i, right) {
  document.querySelectorAll(".quizopt").forEach((b, j) => { if (j === right) b.classList.add("right"); });
  if (i !== right) btn.classList.add("wrong");
  document.querySelectorAll(".quizopt").forEach(b => b.onclick = null);
}

function rSet() {
  const perm = (typeof Notification !== "undefined") ? Notification.permission : "unsupported";
  return `<div class="card"><h2>Google Sheets sync</h2>
    <p class="muted">Your Apps Script web-app URL (ends in /exec).</p>
    <input type="url" id="urlIn" placeholder="https://script.google.com/macros/s/…/exec" value="${cfg()}">
    <button class="btn primary undone" onclick="localStorage.setItem('sheetUrl', document.getElementById('urlIn').value.trim()); pull().then(render)">Save & test connection</button>
    <button class="btn ghost" onclick="pull().then(render)">↻ Sync now</button>
  </div>
  <div class="card"><h2>Notifications</h2>
    <p class="muted">Status: <b>${perm}</b>. Needs the app installed to your home screen (iOS 16.4+). Paste the VAPID public key, then enable.</p>
    <input type="text" id="vapidIn" placeholder="VAPID public key (starts with B…)" value="${localStorage.getItem('vapidKey') || ''}">
    <button class="btn primary undone" onclick="localStorage.setItem('vapidKey', document.getElementById('vapidIn').value.trim()); enablePush()">🔔 Enable notifications</button>
    <p class="muted" id="pushStatus"></p>
  </div>
  <div class="card"><h2>Data</h2>
    <p class="muted">Progress: ${stats().done}/96 · pending sync: ${Object.keys(queue).length} · app v4</p>
    <button class="btn ghost" onclick="navigator.clipboard.writeText(JSON.stringify(state)); this.textContent='Copied ✓'">Export progress (copy JSON)</button>
  </div>
  <div class="card"><h2>Install as app</h2>
    <p class="muted"><b>iPhone:</b> Safari → Share → Add to Home Screen.<br><b>Android:</b> Chrome → menu ⋮ → Add to Home screen.</p>
  </div>`;
}

async function enablePush() {
  const st = document.getElementById("pushStatus");
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      st.textContent = "Push not supported here. On iPhone: install to home screen first, then enable from inside the installed app.";
      return;
    }
    const vk = localStorage.getItem("vapidKey") || "";
    if (!vk) { st.textContent = "Paste the VAPID public key first."; return; }
    const reg = await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { st.textContent = "Permission not granted."; return; }
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64(vk) });
    await fetch(cfg(), { method: "POST", body: JSON.stringify({ subscribe: sub.toJSON() }) });
    st.textContent = "Notifications enabled on this device ✓";
  } catch (err) { st.textContent = "Error: " + err.message; }
}

function urlB64(s) {
  const pad = "=".repeat((4 - (s.length % 4)) % 4);
  const b = (s + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function copyCode(w, btn) {
  navigator.clipboard.writeText(W[w].code).then(() => { btn.textContent = "Copied ✓ — paste in Colab"; });
}

function go(t) {
  tab = t; render();
  if (t === "learn" && cfg() && !curQ && !qBusy && !qErr) nextQ();
}

if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }

async function refresh() {
  if (Object.keys(queue).length) { flushQueue(); return; }
  const before = JSON.stringify(state);
  await pull();
  if (JSON.stringify(state) !== before && tab !== "learn" && !document.querySelector(".vframe") && !document.querySelector(".pybox")) render();
}

render();
pull().then(render);
setInterval(refresh, 60000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });
</script>
